openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TodoTalk messenger API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: friends
    description: Friend management
  - name: rooms
    description: Chat rooms
  - name: messages
    description: Chat messages
  - name: invites
    description: Invite links
  - name: blocked
    description: Block management
  - name: calls
    description: Voice calls
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all registered users
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: All registered users (excluding me)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get my profile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update my profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    delete:
      operationId: deleteMe
      tags: [users]
      summary: Delete my account
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Deleted

  /users/me/push-token:
    post:
      operationId: registerPushToken
      tags: [users]
      summary: Register push token
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTokenInput"
      responses:
        "200":
          description: Token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/persona:
    get:
      operationId: getMyPersona
      tags: [users]
      summary: Get my Another Me persona
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaProfile"
        "401":
          description: Unauthorized

  /users/me/persona/card:
    get:
      operationId: getMyPersonaCard
      tags: [users]
      summary: Get my Another Me identity card
      description: >
        Derived "identity" view (archetype, strengths, weaknesses, growth
        direction, archetype timeline) computed purely from existing stats and AI
        fields. No AI call and no XP/stat mutation. Fetching records an archetype
        history row only when the archetype changes.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My persona identity card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaCard"
        "401":
          description: Unauthorized

  /users/me/persona/analyze:
    post:
      operationId: analyzeMyPersona
      tags: [users]
      summary: Run an on-demand AI analysis of my Another Me persona
      description: >
        Triggered only by the user. Analyzes recent app activity and updates the
        qualitative AI fields. Rate-limited to once per 10 minutes per user.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Updated persona with fresh AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaProfile"
        "401":
          description: Unauthorized
        "422":
          description: Not enough activity to analyze
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaAnalysisError"
        "429":
          description: Cooldown — analysis was run too recently
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaAnalysisError"
        "502":
          description: AI analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaAnalysisError"
        "503":
          description: AI analysis temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaAnalysisError"

  /users/persona/rankings:
    get:
      operationId: getPersonaRankings
      tags: [users]
      summary: Get persona leaderboards
      description: >
        Read-only cumulative leaderboards derived from existing persona stats. No
        AI call and no XP/stat mutation. Only non-sensitive fields are returned
        (name, avatar, level, title, archetype, score, primary stat).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [overall, persuasion, logic, empathy, strategy, archetype]
            default: overall
        - name: archetype
          in: query
          required: false
          description: Only used when type=archetype.
          schema:
            type: string
            enum:
              [
                strategist,
                harmonizer,
                explorer,
                pioneer,
                sage,
                entertainer,
                activist,
                observer,
              ]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Ranking list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaRanking"
        "401":
          description: Unauthorized

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users by email
      security: [{ bearerAuth: [] }]
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /friends:
    get:
      operationId: listFriends
      tags: [friends]
      summary: List my friends
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Friends list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /friends/{userId}:
    delete:
      operationId: removeFriend
      tags: [friends]
      summary: Remove a friend
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /friend-requests:
    post:
      operationId: sendFriendRequest
      tags: [friends]
      summary: Send a friend request
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FriendRequestInput"
      responses:
        "201":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"
        "400":
          description: Invalid request

  /friend-requests/incoming:
    get:
      operationId: listIncomingFriendRequests
      tags: [friends]
      summary: List incoming friend requests
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Incoming requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequestWithUser"

  /friend-requests/outgoing:
    get:
      operationId: listOutgoingFriendRequests
      tags: [friends]
      summary: List outgoing friend requests
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Outgoing requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequestWithUser"

  /friend-requests/{id}/accept:
    patch:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept a friend request
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /friend-requests/{id}/reject:
    patch:
      operationId: rejectFriendRequest
      tags: [friends]
      summary: Reject a friend request
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List chat rooms I'm in
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Room list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatRoom"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a chat room
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoom"

  /rooms/{id}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get room details
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoom"

  /rooms/{id}/leave:
    post:
      operationId: leaveRoom
      tags: [rooms]
      summary: Leave a room
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Left

  /rooms/{id}/mute:
    patch:
      operationId: toggleMuteRoom
      tags: [rooms]
      summary: Toggle mute for a room
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MuteInput"
      responses:
        "200":
          description: Mute toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoomMember"

  /rooms/{id}/members:
    get:
      operationId: listRoomMembers
      tags: [rooms]
      summary: List room members
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"
    post:
      operationId: inviteRoomMembers
      tags: [rooms]
      summary: Invite additional friends to a group room
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMembersInput"
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoom"

  /rooms/{id}/messages:
    get:
      operationId: fetchRoomMessages
      tags: [messages]
      summary: List messages in a room (last 50)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /rooms/{id}/read:
    patch:
      operationId: markRoomRead
      tags: [messages]
      summary: Mark room as read
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadInput"
      responses:
        "204":
          description: Marked read

  /rooms/{id}/typing:
    get:
      operationId: getTypingUsers
      tags: [messages]
      summary: List members currently typing in a room
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Typing members (excluding the requester)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"
    post:
      operationId: setTyping
      tags: [messages]
      summary: Signal that the current user is typing (heartbeat)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Recorded

  /invites:
    post:
      operationId: createInvite
      tags: [invites]
      summary: Create an invite link
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"

  /invites/redeem:
    post:
      operationId: redeemInvite
      tags: [invites]
      summary: Redeem an invite code
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemInviteInput"
      responses:
        "200":
          description: Redeemed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"
        "400":
          description: Invalid or expired invite

  /blocked:
    get:
      operationId: listBlocked
      tags: [blocked]
      summary: List blocked users
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Blocked users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"
    post:
      operationId: blockUser
      tags: [blocked]
      summary: Block a user
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockInput"
      responses:
        "201":
          description: Blocked

  /blocked/{userId}:
    delete:
      operationId: unblockUser
      tags: [blocked]
      summary: Unblock a user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Unblocked

  /calls:
    post:
      operationId: createCall
      tags: [calls]
      summary: Start a voice call
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallInput"
      responses:
        "201":
          description: Call created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallSession"

  /calls/incoming:
    get:
      operationId: listIncomingCalls
      tags: [calls]
      summary: List incoming ringing calls for the current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Incoming calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallWithCaller"

  /calls/{id}:
    get:
      operationId: getCall
      tags: [calls]
      summary: Get call status
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/{id}/accept:
    post:
      operationId: acceptCall
      tags: [calls]
      summary: Accept an incoming call
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallSession"

  /calls/{id}/join:
    post:
      operationId: joinCall
      tags: [calls]
      summary: Join a call from the in-chat call card (caller or callee)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallSession"

  /calls/{id}/decline:
    post:
      operationId: declineCall
      tags: [calls]
      summary: Decline an incoming call
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call declined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/{id}/end:
    post:
      operationId: endCall
      tags: [calls]
      summary: End an active or ringing call
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /dungeons:
    post:
      operationId: createDungeon
      tags: [dungeons]
      summary: Create a dungeon (MUD game room with AI Dungeon Master)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DungeonInput"
      responses:
        "201":
          description: Dungeon room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoom"

  /dungeons/{id}:
    get:
      operationId: getDungeonState
      tags: [dungeons]
      summary: Get the current party/game state of a dungeon
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dungeon game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DungeonState"

  /battles:
    post:
      operationId: createBattle
      tags: [battles]
      summary: Create a talk-battle room (AI-judged debate game)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BattleCreateInput"
      responses:
        "201":
          description: Battle room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoom"

  /battle-topics:
    post:
      operationId: suggestBattleTopics
      tags: [battles]
      summary: Get AI-suggested debate topics for a category
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BattleTopicInput"
      responses:
        "200":
          description: Suggested topics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleTopicSuggestions"

  /battle-personas:
    get:
      operationId: listBattlePersonas
      tags: [battles]
      summary: List available AI opponent personas
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Available AI personas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattlePersonaList"

  /battle-stats:
    get:
      operationId: getMyBattleStats
      tags: [battles]
      summary: My lifetime talk-battle stats (record, MP, level)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My battle stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyBattleStats"

  /battle-history:
    get:
      operationId: getMyBattleHistory
      tags: [battles]
      summary: My recent finished battles (dashboard carousel)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Recent finished battles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BattleHistoryItem"

  /battles/{id}:
    get:
      operationId: getBattleState
      tags: [battles]
      summary: Get the current state of a talk-battle
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Battle game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleState"

  /battles/{id}/ready:
    post:
      operationId: setBattleReady
      tags: [battles]
      summary: Mark yourself ready in the waiting room
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated battle state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleState"

  /battles/{id}/start:
    post:
      operationId: startBattle
      tags: [battles]
      summary: Start the debate (assign sides, generate opening question)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated battle state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleState"

  /battles/{id}/turn:
    post:
      operationId: submitBattleTurn
      tags: [battles]
      summary: Submit your utterance for the current turn (AI evaluates it)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BattleTurnInput"
      responses:
        "200":
          description: Updated battle state after evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleState"

  /battles/{id}/restart:
    post:
      operationId: restartBattle
      tags: [battles]
      summary: Reset the battle back to the waiting room for another game
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Battle reset to waiting room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleState"

  /battles/{id}/cancel:
    post:
      operationId: cancelBattle
      tags: [battles]
      summary: Cancel a waiting battle and delete its room (host only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Battle cancelled and room deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

