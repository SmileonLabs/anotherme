      type: object
      required:
        [key, type, title, description, progress, target, completed, rewardClaimed, rewardExp]
      properties:
        key: { type: string }
        type: { type: string, enum: [daily, weekly] }
        title: { type: string }
        description: { type: string }
        progress: { type: integer }
        target: { type: integer }
        completed: { type: boolean }
        rewardClaimed: { type: boolean }
        rewardExp: { type: integer }
    Achievement:
      type: object
      required:
        [key, title, description, category, icon, unlocked, rewardClaimed, rewardExp]
      properties:
        key: { type: string }
        title: { type: string }
        description: { type: string }
        category:
          type: string
          enum: [chat, battle, dungeon, clan, persona]
        icon: { type: string }
        unlocked: { type: boolean }
        rewardClaimed: { type: boolean }
        rewardExp: { type: integer }
    RewardClaimResult:
      type: object
      required: [ok, rewardExp]
      properties:
        ok: { type: boolean }
        rewardExp: { type: integer }
    RewardClaimError:
      type: object
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }
    RewardsSummary:
      type: object
      required: [claimableQuests, claimableAchievements, total]
      properties:
