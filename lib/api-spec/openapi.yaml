openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TodoTalk messenger API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: friends
    description: Friend management
  - name: rooms
    description: Chat rooms
  - name: messages
    description: Chat messages
  - name: invites
    description: Invite links
  - name: blocked
    description: Block management
  - name: calls
    description: Voice calls
  - name: quests
    description: Daily/weekly quests & achievements
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all registered users
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: All registered users (excluding me)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get my profile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update my profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    delete:
      operationId: deleteMe
      tags: [users]
      summary: Delete my account
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Deleted

  /users/me/push-token:
    post:
      operationId: registerPushToken
      tags: [users]
      summary: Register push token
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTokenInput"
      responses:
        "200":
          description: Token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/persona:
    get:
      operationId: getMyPersona
      tags: [users]
      summary: Get my Another Me persona
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaProfile"
        "401":
          description: Unauthorized

  /users/me/persona/card:
    get:
      operationId: getMyPersonaCard
      tags: [users]
      summary: Get my Another Me identity card
      description: >
        Derived "identity" view (archetype, strengths, weaknesses, growth
        direction, archetype timeline) computed purely from existing stats and AI
        fields. No AI call and no XP/stat mutation. Fetching records an archetype
        history row only when the archetype changes.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My persona identity card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaCard"
        "401":
          description: Unauthorized

  /users/me/persona/analyze:
    post:
      operationId: analyzeMyPersona
      tags: [users]
      summary: Run an on-demand AI analysis of my Another Me persona
      description: >
        Triggered only by the user. Analyzes recent app activity and updates the
        qualitative AI fields. Rate-limited to once per 10 minutes per user.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Updated persona with fresh AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaProfile"
        "401":
          description: Unauthorized
        "422":
          description: Not enough activity to analyze
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaAnalysisError"
        "429":
          description: Cooldown — analysis was run too recently
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaAnalysisError"
        "502":
          description: AI analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaAnalysisError"
        "503":
          description: AI analysis temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaAnalysisError"

  /users/persona/rankings:
    get:
      operationId: getPersonaRankings
      tags: [users]
      summary: Get persona leaderboards
      description: >
        Read-only cumulative leaderboards derived from existing persona stats. No
        AI call and no XP/stat mutation. Only non-sensitive fields are returned
        (name, avatar, level, title, archetype, score, primary stat).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [overall, persuasion, logic, empathy, strategy, archetype]
            default: overall
        - name: archetype
          in: query
          required: false
          description: Only used when type=archetype.
          schema:
            type: string
            enum:
              [
                strategist,
                harmonizer,
                explorer,
                pioneer,
                sage,
                entertainer,
                activist,
                observer,
              ]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Ranking list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaRanking"
        "401":
          description: Unauthorized

  /users/me/clan:
    get:
      operationId: getMyClan
      tags: [clans]
      summary: Get my clan (or null)
      description: >
        My clan with my role, member count, and a few recent members. Returns
        null when I am not in any clan. Member rows expose only non-sensitive
        fields (name, avatar, level, title, archetype, role, contribution).
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My clan or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MyClan"
                  - type: "null"
        "401":
          description: Unauthorized

  /clans:
    get:
      operationId: listClans
      tags: [clans]
      summary: Browse / search clans
      security: [{ bearerAuth: [] }]
      parameters:
        - name: q
          in: query
          required: false
          description: Search term matched against name and description.
          schema:
            type: string
        - name: archetype
          in: query
          required: false
          schema:
            type: string
            enum:
              [
                strategist,
                harmonizer,
                explorer,
                pioneer,
                sage,
                entertainer,
                activist,
                observer,
              ]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Clan list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClanSummary"
        "401":
          description: Unauthorized
    post:
      operationId: createClan
      tags: [clans]
      summary: Create a clan
      description: >
        Create a clan and join it as owner. Fails if the user already belongs to
        a clan or the name is taken.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClanCreate"
      responses:
        "201":
          description: Created clan (my-clan view)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyClan"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "401":
          description: Unauthorized
        "409":
          description: Already in a clan, or name taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clans/rankings:
    get:
      operationId: getClanRankings
      tags: [clans]
      summary: Get clan leaderboards
      description: >
        Read-only clan leaderboards. No AI call and no XP / clan-EXP mutation.
        Only non-sensitive clan-level fields are returned (name, emblem, level,
        exp, member count, dominant archetype, clan power, strengths, score) —
        never any per-member PII.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [overall, level, contribution, average_level, archetype]
            default: overall
        - name: archetype
          in: query
          required: false
          description: Only used when type=archetype.
          schema:
            type: string
            enum:
              [
                strategist,
                harmonizer,
                explorer,
                pioneer,
                sage,
                entertainer,
                activist,
                observer,
              ]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Clan ranking list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanRanking"
        "401":
          description: Unauthorized

  /clans/{id}:
    get:
      operationId: getClanDetail
      tags: [clans]
      summary: Get clan detail with members
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanDetail"
        "401":
          description: Unauthorized
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clans/{id}/identity:
    get:
      operationId: getClanIdentity
      tags: [clans]
      summary: Get a clan's collective identity (computed, read-only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clan identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanIdentity"
        "401":
          description: Unauthorized
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clans/{id}/wisdom:
    get:
      operationId: getClanWisdom
      tags: [clans]
      summary: Get a clan's collective wisdom (members only)
      description: >
        Returns a clan's AI-summarized collective wisdom (philosophy / strategy /
        values / culture / motto), derived read-only from existing clan memories
        and collective identity. Members only. Returns null when no wisdom has
        been generated yet. No XP / clan-EXP / ranking mutation.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clan wisdom, or null if not generated yet
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ClanWisdom"
                  - type: "null"
        "401":
          description: Unauthorized
        "403":
          description: Not a clan member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: Clan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clans/{id}/wisdom/generate:
    post:
      operationId: generateClanWisdom
      tags: [clans]
      summary: Generate (or regenerate) a clan's wisdom (owner/elder only)
      description: >
        Summarizes the clan's existing memories and collective identity into a
        five-part wisdom via a single AI call, then stores it (one row per clan).
        Owner/elder only; runs only on this explicit request, never in real time.
        Requires at least one clan memory. Never mutates memories, persona XP,
        clan EXP, or ranking.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated wisdom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanWisdom"
        "400":
          description: No memories to summarize, or generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "401":
          description: Unauthorized
        "403":
          description: Not an owner/elder of the clan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: Clan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clans/{id}/join:
    post:
      operationId: joinClan
      tags: [clans]
      summary: Join a clan
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Joined (my-clan view)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyClan"
        "401":
          description: Unauthorized
        "404":
          description: Clan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "409":
          description: Already in a clan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clans/{id}/leave:
    post:
      operationId: leaveClan
      tags: [clans]
      summary: Leave a clan (deletes it if owner is the last member)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Leave result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanLeaveResult"
        "401":
          description: Unauthorized
        "403":
          description: Owner must transfer ownership first, or not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: Clan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clans/{id}/memories:
    get:
      operationId: listClanMemories
      tags: [clans]
      summary: List a clan's memories (members only)
      description: >
        Returns a clan's accumulated memories (strategy / lesson / value /
        achievement / warning). Members only. No AI call, no XP / clan-EXP
        mutation, and no raw chat / battle / dungeon content — only the
        user-authored title, summary, tags, and an optional source reference.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [strategy, lesson, value, achievement, warning]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Clan memory list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanMemoryList"
        "401":
          description: Unauthorized
        "403":
          description: Not a clan member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: Clan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
    post:
      operationId: createClanMemory
      tags: [clans]
      summary: Create a clan memory (members only)
      description: >
        Create a user-authored clan memory. Members only. The body must contain
        a human-written summary — raw conversation/battle/dungeon content must
        never be sent here.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClanMemoryCreate"
      responses:
        "201":
          description: Created memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanMemory"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "401":
          description: Unauthorized
        "403":
          description: Not a clan member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: Clan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clans/{id}/memories/{memoryId}:
    delete:
      operationId: deleteClanMemory
      tags: [clans]
      summary: Delete a clan memory (author or elder/owner)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: memoryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanMemoryDeleteResult"
        "401":
          description: Unauthorized
        "403":
          description: Not allowed to delete this memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: Memory not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users by email
      security: [{ bearerAuth: [] }]
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /friends:
    get:
      operationId: listFriends
      tags: [friends]
      summary: List my friends
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Friends list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /friends/{userId}:
    delete:
      operationId: removeFriend
      tags: [friends]
      summary: Remove a friend
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /friend-requests:
    post:
      operationId: sendFriendRequest
      tags: [friends]
      summary: Send a friend request
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FriendRequestInput"
      responses:
        "201":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"
        "400":
          description: Invalid request

  /friend-requests/incoming:
    get:
      operationId: listIncomingFriendRequests
      tags: [friends]
      summary: List incoming friend requests
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Incoming requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequestWithUser"

  /friend-requests/outgoing:
    get:
      operationId: listOutgoingFriendRequests
      tags: [friends]
      summary: List outgoing friend requests
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Outgoing requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequestWithUser"

  /friend-requests/{id}/accept:
    patch:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept a friend request
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /friend-requests/{id}/reject:
    patch:
      operationId: rejectFriendRequest
      tags: [friends]
      summary: Reject a friend request
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List chat rooms I'm in
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Room list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatRoom"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a chat room
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoom"

  /rooms/{id}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get room details
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoom"

  /rooms/{id}/leave:
    post:
      operationId: leaveRoom
      tags: [rooms]
      summary: Leave a room
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Left

  /rooms/{id}/mute:
    patch:
      operationId: toggleMuteRoom
      tags: [rooms]
      summary: Toggle mute for a room
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MuteInput"
      responses:
        "200":
          description: Mute toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoomMember"

  /rooms/{id}/members:
    get:
      operationId: listRoomMembers
      tags: [rooms]
      summary: List room members
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"
    post:
      operationId: inviteRoomMembers
      tags: [rooms]
      summary: Invite additional friends to a group room
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMembersInput"
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoom"

