      summary: Get my achievements
      description: >
        Returns all achievements with unlock/claim state. Unlock is computed on
        read from existing activity; no AI is called and no domain activity is
        created.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My achievements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"
        "401":
          description: Unauthorized

  /users/me/achievements/{achievementKey}/claim:
    post:
      operationId: claimAchievementReward
      tags: [quests]
      summary: Claim an unlocked achievement's reward
      security: [{ bearerAuth: [] }]
      parameters:
        - name: achievementKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reward granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardClaimResult"
        "401":
          description: Unauthorized
        "404":
          description: Unknown achievement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardClaimError"
        "409":
          description: Not unlocked or already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardClaimError"

  /users/me/rewards/summary:
    get:
      operationId: getMyRewardsSummary
      tags: [quests]
      summary: Count of claimable quest/achievement rewards (for badges)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Claimable reward counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardsSummary"
        "401":
          description: Unauthorized

components:
  securitySchemes:
