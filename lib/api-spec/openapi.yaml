  /clan-wars:
    get:
      operationId: listClanWars
      tags: [clan-wars]
      summary: List clan wars relevant to the caller
      description: >
        Returns open public challenges plus all wars involving the caller's clan,
        most recent first. Optionally filtered by status.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, matched, active, completing, completed, cancelled]
      responses:
        "200":
          description: List of clan war summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClanWarSummary"
        "401":
          description: Unauthorized
    post:
      operationId: createClanWar
      tags: [clan-wars]
      summary: Create a clan war (challenger owner/elder only)
      description: >
        The creator's clan becomes the challenger. Provide opponentClanId to
        directly challenge a clan (status=matched), or omit it for a public
        challenge (status=open) any other clan's owner/elder can accept. Owner or
        elder only.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic]
              properties:
                topic:
                  type: string
                opponentClanId:
                  type: string
                  nullable: true
      responses:
        "201":
          description: The created war
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanWarDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "401":
          description: Unauthorized
        "403":
          description: Not an owner/elder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clan-wars/{id}:
    get:
      operationId: getClanWar
      tags: [clan-wars]
      summary: Get a clan war's detail
      description: >
        Open challenges are visible to everyone; other statuses require membership
        in one of the two participating clans. Never exposes other members' raw
        submissions — only the caller's own submission text and AI summaries.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: War detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanWarDetail"
        "401":
          description: Unauthorized
        "403":
          description: Not allowed to view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: War not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clan-wars/{id}/accept:
    post:
      operationId: acceptClanWar
      tags: [clan-wars]
      summary: Accept an open public challenge (opponent owner/elder)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
