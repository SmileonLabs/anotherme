          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "409":
          description: War not joinable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clan-wars/{id}/submit:
    post:
      operationId: submitClanWarArgument
      tags: [clan-wars]
      summary: Submit a member's argument (once)
      description: >
        Auto-joins the caller if not already a participant. Each member may submit
        exactly once; a second submission is rejected.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "200":
          description: War detail after submitting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanWarDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "401":
          description: Unauthorized
        "403":
          description: Not a member of a participating clan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: War not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "409":
          description: Already submitted, or war not accepting submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clan-wars/{id}/complete:
    post:
      operationId: completeClanWar
      tags: [clan-wars]
      summary: Judge and finalize a war (owner/elder of either clan)
      description: >
        Requires both sides to have at least one submission. Calls the AI judge
        exactly once to score every submission, derives each clan's score as the
        top-3 average, records the winner and result, and applies small isolated
        clan-EXP rewards. Idempotent — repeat calls return the completed war.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The completed war
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanWarDetail"
        "401":
          description: Unauthorized
        "403":
          description: Not an owner/elder of a participating clan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: War not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "409":
          description: Not ready to complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "502":
          description: AI judge failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

  /clan-wars/{id}/cancel:
    post:
      operationId: cancelClanWar
      tags: [clan-wars]
      summary: Cancel a war before completion (challenger owner/elder)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The cancelled war
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanWarDetail"
        "401":
          description: Unauthorized
        "403":
          description: Not the challenger's owner/elder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "404":
          description: War not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"
        "409":
          description: Already finished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClanError"

